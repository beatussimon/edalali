{% extends 'base.html' %}

{% block content %}
<h2>Cancel Booking</h2>

<p>Are you sure you want to cancel your booking for {{ booking.listing.title }} from {{ booking.check_in_date }} to {{ booking.check_out_date }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Confirm Cancellation</button>
    <a href="{% url 'my_bookings' %}">Go Back</a>
</form>
{% endblock %}
